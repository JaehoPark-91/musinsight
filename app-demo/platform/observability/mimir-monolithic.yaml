# Mimir 모놀리식 (단일 파드, filesystem 저장, emptyDir) 데모용
# -target=all 로 전 컴포넌트를 한 프로세스로 실행
# 쿼리(PromQL): http://mimir.observability.svc.cluster.local:8080/prometheus
# 수신(remote_write): http://mimir.observability.svc.cluster.local:8080/api/v1/push
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: observability
data:
  mimir.yaml: |
    multitenancy_enabled: false
    activity_tracker:
      filepath: /data/metrics-activity.log
    server:
      http_listen_port: 8080
      log_level: warn
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/common
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/blocks
      bucket_store:
        sync_dir: /data/tsdb-sync
      tsdb:
        dir: /data/tsdb
    compactor:
      data_dir: /data/compactor
      sharding_ring:
        kvstore:
          store: memberlist
    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
    ingester:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
        replication_factor: 1
    store_gateway:
      sharding_ring:
        replication_factor: 1
    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/rules
    limits:
      compactor_blocks_retention_period: 24h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: observability
  labels: { app: mimir }
spec:
  replicas: 1
  selector:
    matchLabels: { app: mimir }
  template:
    metadata:
      labels: { app: mimir }
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: mimir
          image: grafana/mimir:2.14.2
          workingDir: /data
          args:
            - -config.file=/etc/mimir/mimir.yaml
            - -target=all
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /ready, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/mimir }
            - { name: data, mountPath: /data }
      volumes:
        - name: config
          configMap: { name: mimir-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: observability
  labels: { app: mimir }
spec:
  selector: { app: mimir }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
