# Tempo (grafana/tempo) 모놀리식, local(filesystem) 저장, 비영속(emptyDir) 데모용
# OTLP 수신(gRPC 4317, HTTP 4318) 활성화 -> Alloy가 트레이스를 여기로 전송
tempo:
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  retention: 24h
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
persistence:
  enabled: false
