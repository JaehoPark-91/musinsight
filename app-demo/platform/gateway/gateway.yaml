# Gateway API: NLB(ACM TLS 종단) -> Istio 게이트웨이(443 HTTP 수신) -> HTTPRoute 호스트 라우팅
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-gw
  namespace: istio-system
spec:
  gatewayClassName: istio
  infrastructure:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:ap-northeast-2:273349345035:certificate/28f305ce-612c-402d-8305-46c509d85895"
      service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
      service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
  listeners:
    - name: https
      port: 443
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: istio-system
spec:
  parentRefs: [{ name: demo-gw, namespace: istio-system }]
  hostnames: ["grafana.kia-awsops.noticore.co.kr"]
  rules:
    - backendRefs: [{ name: grafana, port: 80 }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  namespace: istio-system
spec:
  parentRefs: [{ name: demo-gw, namespace: istio-system }]
  hostnames: ["kiali.kia-awsops.noticore.co.kr"]
  rules:
    - backendRefs: [{ name: kiali, port: 20001 }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookinfo
  namespace: bookinfo
spec:
  parentRefs: [{ name: demo-gw, namespace: istio-system }]
  hostnames: ["bookinfo.kia-awsops.noticore.co.kr"]
  rules:
    - backendRefs: [{ name: productpage, port: 9080 }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mimir
  namespace: observability
spec:
  parentRefs: [{ name: demo-gw, namespace: istio-system }]
  hostnames: ["mimir.kia-awsops.noticore.co.kr"]
  rules:
    # 대시보드 데이터소스 연결 테스트는 prometheus 타입에 대해 /-/healthy 를 친다.
    # Mimir는 /prometheus 프리픽스 아래에 /-/healthy 를 노출하지 않으므로(404),
    # 이 경로만 Mimir 루트 /ready 로 리라이트해서 테스트가 통과하게 한다.
    - matches:
        - path: { type: Exact, value: /prometheus/-/healthy }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplaceFullPath, replaceFullPath: /ready }
      backendRefs: [{ name: mimir, port: 8080 }]
    - backendRefs: [{ name: mimir, port: 8080 }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki
  namespace: observability
spec:
  parentRefs: [{ name: demo-gw, namespace: istio-system }]
  hostnames: ["loki.kia-awsops.noticore.co.kr"]
  rules:
    - backendRefs: [{ name: loki, port: 3100 }]
